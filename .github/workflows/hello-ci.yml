name: Android CI
on:
  push:
    branches:        # 在 push 事件下增加分支篩選
      - master         # 只針對 master 分支觸發

# 新增這部分：設定全域環境變數
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17          # 修改名字方便識別
        uses: actions/setup-java@v4
        with:
          java-version: '17'        # 將這裡從 '11' 改為 '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        # 跑你剛才在 Android Studio 跑的那個 task
        run: ./gradlew testDebugUnitTest -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"
        
      - name: Upload Test Report
        if: always() # 無論測試成功或失敗都執行
        uses: actions/apps/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/