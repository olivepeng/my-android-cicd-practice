name: Android CI
on:
  push:
    branches:        # 在 push 事件下增加分支篩選
      - master         # 只針對 master 分支觸發

# 新增這部分：設定全域環境變數
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3 # 新增這一步：安裝 Android 開發工具
        
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug  